name: Release

# Tag-driven: build → attach a GitHub Release → (optionally) publish to PyPI.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # manual run — publishes to GitHub Packages without a new tag

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - run: pipx run twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/') }}   # only real tag pushes make a Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    needs: build
    # Publishing to PyPI uses Trusted Publishing (OIDC — no stored token). It stays
    # SKIPPED (not failed) until you opt in: create a PyPI pending publisher (project
    # `tracelines`, repo Prekzursil/tracelines, workflow release.yml, env `pypi`) and
    # set repo variable PYPI_TRUSTED_PUBLISHER=true. `skip-existing` tolerates an
    # already-published version (e.g. 0.2.0 was published manually).
    if: ${{ vars.PYPI_TRUSTED_PUBLISHER == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tracelines
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-npm:
    needs: build
    # npm CANNOT bootstrap a NEW package via OIDC — the FIRST publish must be manual
    # (from npm/:  npm login && npm publish --access public). AFTER the package exists,
    # add a Trusted Publisher on npmjs.com (repo Prekzursil/tracelines, workflow
    # release.yml, environment `npm`) and set repo variable NPM_TRUSTED_PUBLISHER=true;
    # subsequent tags then publish tokenlessly here. Keep npm/package.json version in
    # sync with the tag.
    if: ${{ vars.NPM_TRUSTED_PUBLISHER == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/tracelines
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest   # OIDC trusted publishing needs npm >= 11.5.1
      - run: npm publish --provenance --access public
        working-directory: npm

  publish-github-packages:
    needs: build
    # GitHub Packages (npm.pkg.github.com) — fills the repo's "Packages" sidebar.
    # Uses GITHUB_TOKEN (no setup needed; CAN do the first publish, unlike npmjs OIDC).
    # GitHub Packages requires a scoped name, so we publish as @prekzursil/tracelines
    # (the unscoped `tracelines` on npmjs.com is unaffected).
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@prekzursil"
      - name: Scope to the GitHub owner (GitHub Packages requires @owner/name)
        working-directory: npm
        run: npm pkg set name=@prekzursil/tracelines
      - name: Publish to GitHub Packages
        working-directory: npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
