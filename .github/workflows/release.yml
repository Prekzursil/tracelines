name: Release

# Tag-driven publish to PyPI via Trusted Publishing (OIDC — no stored token).
# One-time PyPI setup required: create a "pending publisher" for project `tracelines`
# pointing at repo Prekzursil/tracelines, workflow release.yml, environment `pypi`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - run: pipx run twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tracelines
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Don't fail the run if this version is already on PyPI (e.g. published
          # manually, or a re-run of the same tag).
          skip-existing: true
