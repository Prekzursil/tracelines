name: Release

# Tag-driven: build → attach a GitHub Release → (optionally) publish to PyPI.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - run: pipx run twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    needs: build
    # Publishing to PyPI uses Trusted Publishing (OIDC — no stored token). It stays
    # SKIPPED (not failed) until you opt in: create a PyPI pending publisher (project
    # `tracelines`, repo Prekzursil/tracelines, workflow release.yml, env `pypi`) and
    # set repo variable PYPI_TRUSTED_PUBLISHER=true. `skip-existing` tolerates an
    # already-published version (e.g. 0.2.0 was published manually).
    if: ${{ vars.PYPI_TRUSTED_PUBLISHER == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tracelines
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
