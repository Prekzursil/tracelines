site_name: tracelines
site_description: Extract official Street View blue-line coverage as GeoJSON — never photospheres.
site_url: https://prekzursil.github.io/tracelines/docs/
repo_url: https://github.com/Prekzursil/tracelines
repo_name: Prekzursil/tracelines
copyright: AGPL-3.0-or-later · not affiliated with Google, Mapillary, or KartaView

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-night, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-sunny, name: Switch to light mode }

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - Start here:
      - Explain like I'm 5: eli5.md
      - Coverage 101: concepts.md
      - Quickstart: quickstart.md
      - Using the GUI: gui.md
  - Reference:
      - Architecture: architecture.md
      - Methodology (Filter Contract): methodology.md
      - Verification: verification.md
      - Findings: findings.md
      - Data provenance & licensing: data-provenance.md
      - Output schema: output-schema.md
      - API reference: api.md
  - Project:
      - Contributing: contributing.md
      - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Prekzursil/tracelines
